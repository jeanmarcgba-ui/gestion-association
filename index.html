/* ================= SAUVEGARDE & RESTAURATION (créateur uniquement) ================= */
// La liste des clés sauvegardées reprend toutes les données synchronisées de l'application.
function exportFullBackup(){
  const session = getSession();
  if(!session || session.role !== 'createur'){
    toast('Seul le créateur de l\'application peut effectuer une sauvegarde.');
    return;
  }
  const backup = {
    _backupInfo: {
      assocName: (getSettings()||{}).assocName || 'Association',
      exportedBy: session.fullName,
      exportedAt: new Date().toISOString(),
      appVersion: '2026-07-06-A'
    }
  };
  SYNC_KEYS.forEach(key=>{
    backup[key] = loadJSON(key, null);
  });
  const blob = new Blob([JSON.stringify(backup, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const dateStr = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `sauvegarde_association_${dateStr}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 5000);
  toast('Sauvegarde téléchargée.');
}

function restoreFullBackup(){
  const session = getSession();
  if(!session || session.role !== 'createur'){
    toast('Seul le créateur de l\'application peut restaurer une sauvegarde.');
    return;
  }
  const fileInput = document.getElementById('backupFileInput');
  const file = fileInput.files[0];
  if(!file){ toast('Veuillez choisir un fichier de sauvegarde.'); return; }

  const reader = new FileReader();
  reader.onload = ()=>{
    let backup;
    try{
      backup = JSON.parse(reader.result);
    }catch(e){
      toast('Fichier invalide : ce n\'est pas une sauvegarde reconnue.');
      return;
    }
    const info = backup._backupInfo;
    const infoText = info
      ? `Sauvegarde de "${info.assocName}", exportée par ${info.exportedBy} le ${fmtDateTime(info.exportedAt)}.`
      : "Ce fichier ne contient pas d'informations de sauvegarde reconnues.";
    const ok = confirm(
      `${infoText}\n\nRestaurer va REMPLACER TOUTES les données actuelles de l'application (sur cet appareil et, après synchronisation, sur tous les autres appareils connectés).\n\nCette action est irréversible. Continuer ?`
    );
    if(!ok) return;

    let restoredCount = 0;
    SYNC_KEYS.forEach(key=>{
      if(backup[key] !== undefined && backup[key] !== null){
        saveJSON(key, backup[key]); // déclenche aussi l'envoi vers Supabase pour synchroniser les autres appareils
        restoredCount++;
      }
    });

    toast(`Sauvegarde restaurée (${restoredCount} éléments). Synchronisation en cours...`);
    updateAppIcons();
    render();
  };
  reader.onerror = ()=>{ toast('Erreur lors de la lecture du fichier.'); };
  reader.readAsText(file);
}

function deleteAnnouncement(id){
  if(!confirm('Retirer cette notification pour tout le monde ?')) return;
  setAnnouncements(getAnnouncements().filter(a=>a.id!==id));
  toast('Notification retirée.');
  render();
}

/* ---------------- PAGE-LEVEL EVENT WIRING ---------------- */
function attachPageEvents(path, session){
  if(path==='profil'){
    wireFilePreview('profilePhotoInput', 'dropProfilePhoto');
    const form = document.getElementById('profilForm');
    if(form){
      form.addEventListener('submit', e=>{
        e.preventDefault();
        saveProfile(session);
      });
    }
    return;
  }
  if(path==='dons'){
    const tabs = document.getElementById('donsTabs');
    if(tabs){
      tabs.addEventListener('click', e=>{
        const btn = e.target.closest('button[data-tab]');
        if(!btn) return;
        donsTab = btn.dataset.tab;
        render();
      });
    }
    const donForm = document.getElementById('donForm');
    if(donForm){
      donForm.addEventListener('submit', e=>{ e.preventDefault(); declareDonation(session); });
    }
    const campaignForm = document.getElementById('campaignForm');
    if(campaignForm){
      campaignForm.addEventListener('submit', e=>{
        e.preventDefault();
        const title = document.getElementById('campTitle').value.trim();
        const targetAmount = Number(document.getElementById('campTarget').value);
        const description = document.getElementById('campDesc').value.trim();
        if(!title || !targetAmount){ toast('Veuillez remplir le titre et l\'objectif.'); return; }
        const campaigns = getCampaigns();
        campaigns.push({id:uid(), title, targetAmount, description, active:true, createdBy:session.fullName, createdAt:new Date().toISOString()});
        setCampaigns(campaigns);
        toast('Campagne créée.');
        render();
      });
    }
    return;
  }
  if(path==='boutique'){
    const tabs = document.getElementById('boutiqueTabs');
    if(tabs){
      tabs.addEventListener('click', e=>{
        const btn = e.target.closest('button[data-tab]');
        if(!btn) return;
        boutiqueTab = btn.dataset.tab;
        render();
      });
    }
    wireFilePreview('prodImage', 'dropProduct');
    const productForm = document.getElementById('productForm');
    if(productForm){
      productForm.addEventListener('submit', async e=>{
        e.preventDefault();
        const name = document.getElementById('prodName').value.trim();
        const price = Number(document.getElementById('prodPrice').value);
        const description = document.getElementById('prodDesc').value.trim();
        if(!name || !price){ toast('Veuillez remplir le nom et le prix.'); return; }
        const imageInput = document.getElementById('prodImage');
        let image = '';
        if(imageInput.files[0]){
          try{ image = await compressImageFile(imageInput.files[0], 800, 0.75); }catch(e){}
        }
        const products = getProducts();
        products.push({id:uid(), name, price, description, image, createdBy:session.fullName, createdAt:new Date().toISOString()});
        setProducts(products);
        toast('Produit ajouté.');
        render();
      });
    }
    return;
  }
  if(path==='actualites'){
    markSeen('news', session.username);
    const form = document.getElementById('newsForm');
    if(form){
      form.addEventListener('submit', e=>{
        e.preventDefault();
        const title = document.getElementById('newsTitle').value.trim();
        const content = document.getElementById('newsContent').value.trim();
        if(!title || !content){ toast('Veuillez remplir tous les champs.'); return; }
        const posts = getNews();
        posts.push({id:uid(), title, content, author:session.fullName, createdAt:new Date().toISOString()});
        setNews(posts);
        toast('Article publié.');
        render();
      });
    }
    return;
  }
  if(path==='forum'){
    markSeen('forum', session.username);
    const tabs = document.getElementById('forumTabs');
    if(tabs){
      tabs.addEventListener('click', e=>{
        const btn = e.target.closest('button[data-tab]');
        if(!btn) return;
        forumTab = btn.dataset.tab;
        render();
      });
    }
    const form = document.getElementById('forumForm');
    if(form){
      form.addEventListener('submit', e=>{
        e.preventDefault();
        sendForumMessage();
      });
    }
    const msgInput = document.getElementById('forumMsg');
    if(msgInput){
      msgInput.addEventListener('input', ()=>{
        window._isTypingNow = true;
        clearTimeout(window._typingTimeout);
        pushPresence(session, {typing:true});
        window._typingTimeout = setTimeout(()=>{
          window._isTypingNow = false;
          pushPresence(session, {typing:false});
        }, 3000);
      });
    }
    const thread = document.getElementById('forumThread');
    if(thread) thread.scrollTop = thread.scrollHeight;
    const voiceBtn = document.getElementById('voiceBtn');
    if(voiceBtn){
      voiceBtn.addEventListener('click', startVoiceRecording);
    }
    startForumPresence(session);
    return;
  }
  if(path==='calendrier'){
    const form = document.getElementById('eventForm');
    if(form){
      form.addEventListener('submit', e=>{
        e.preventDefault();
        const title = document.getElementById('evTitle').value.trim();
        const date = document.getElementById('evDate').value;
        if(!title || !date){ toast('Veuillez remplir le titre et la date.'); return; }
        const events = getEvents();
        events.push({
          id:uid(), title, date,
          time: document.getElementById('evTime').value,
          location: document.getElementById('evLocation').value.trim(),
          description: document.getElementById('evDesc').value.trim(),
          createdBy: session.fullName, createdAt: new Date().toISOString()
        });
        setEvents(events);
        toast('Événement ajouté.');
        render();
      });
    }
    return;
  }
  if(path==='galerie'){
    const btn = document.getElementById('galleryUploadBtn');
    if(btn) btn.addEventListener('click', uploadGalleryPhoto);
    wireFilePreview('galleryFile', 'dropGallery');
    return;
  }
  if(path==='documents'){
    const btn = document.getElementById('docUploadBtn');
    if(btn) btn.addEventListener('click', uploadDocument);
    wireFilePreview('docFile', 'dropDoc');
    return;
  }
  if(path==='comptabilite'){
    const tabs = document.getElementById('comptaTabs');
    if(tabs){
      tabs.addEventListener('click', e=>{
        const btn = e.target.closest('button[data-tab]');
        if(!btn) return;
        comptaTab = btn.dataset.tab;
        render();
      });
    }
    const registerPaymentForm = document.getElementById('registerPaymentForm');
    if(registerPaymentForm){
      registerPaymentForm.addEventListener('submit', e=>{
        e.preventDefault();
        registerPayment(session);
      });
    }
    const mouvForm = document.getElementById('mouvForm');
    if(mouvForm){
      mouvForm.addEventListener('submit', e=>{
        e.preventDefault();
        const type = document.getElementById('mvType').value;
        saveAccountingEntry(type, 'mv');
      });
    }
    const recetteForm = document.getElementById('recetteForm');
    if(recetteForm){
      recetteForm.addEventListener('submit', e=>{
        e.preventDefault();
        saveAccountingEntry('recette', 'rc');
      });
    }
    return;
  }
  if(path==='membres'){
    const {param} = currentRoute();
    if(!param){
      const search = document.getElementById('memberSearch');
      if(search){
        search.addEventListener('input', ()=>{
          const q = search.value.toLowerCase();
          const members = getMembers().filter(m =>
            (m.nom||'').toLowerCase().includes(q) ||
            (m.prenom||'').toLowerCase().includes(q) ||
            (m.roleAssociation||'').toLowerCase().includes(q)
          );
          document.getElementById('memberGrid').innerHTML = members.length
            ? members.slice().reverse().map(m=>memberCardHtml(m)).join('')
            : `<div class="card" style="grid-column:1/-1;text-align:center;color:var(--ink-soft);padding:40px;">Aucun résultat.</div>`;
        });
      }
    } else if(param==='nouveau' || param.startsWith('edit/')){
      ['photo','cni','attestation'].forEach(attachFileDrop);
      const form = document.getElementById('memberForm');
      if(form){
        form.addEventListener('submit', e=>{
          e.preventDefault();
          saveMemberForm(session);
        });
      }
    } else {
      const payForm = document.getElementById('paymentForm');
      if(payForm){
        payForm.addEventListener('submit', e=>{
          e.preventDefault();
          declarePayment(session);
        });
      }
    }
    return;
  }
  if(path==='options'){
    const tabs = document.getElementById('optTabs');
    if(tabs){
      tabs.addEventListener('click', e=>{
        const btn = e.target.closest('button[data-tab]');
        if(!btn) return;
        tabs.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.opt-panel').forEach(p=>p.classList.add('hidden'));
        document.querySelector(`.opt-panel[data-panel="${btn.dataset.tab}"]`).classList.remove('hidden');
      });
      wireFilePreview('optLogo', 'drop_logo');
      wireFilePreview('backupFileInput', 'dropBackup');
      const restoreBtn = document.getElementById('restoreBackupBtn');
      if(restoreBtn) restoreBtn.addEventListener('click', restoreFullBackup);
      const announcementForm = document.getElementById('announcementForm');
      if(announcementForm){
        announcementForm.addEventListener('submit', e=>{
          e.preventDefault();
          const msg = document.getElementById('announcementMsg').value.trim();
          if(!msg) return;
          const announcements = getAnnouncements();
          announcements.push({id:uid(), message:msg, createdBy:session.fullName, createdAt:new Date().toISOString()});
          setAnnouncements(announcements);
          toast('Notification publiée.');
          render();
        });
      }
    }
  }
}

function saveMemberForm(session){
  const spec = memberFieldsSpec();
  const id = document.getElementById('f_id').value || uid();
  const members = getMembers();
  const idx = members.findIndex(m=>m.id===id);
  const data = idx>=0 ? {...members[idx]} : {id, cotisationStatus:'en_attente', createdBy:session.fullName, createdAt:new Date().toISOString(), linkedUserId: session.role==='membre'?session.userId:null};

  let valid = true;
  Object.entries(spec).forEach(([key,f])=>{
    const el = document.getElementById('f_'+key);
    const val = el.value.trim();
    if(f.required && !val) valid = false;
    data[key] = val;
  });
  ['photo','cni','attestation'].forEach(key=>{
    const el = document.getElementById('f_'+key);
    if(el && el.dataset.value) data[key] = el.dataset.value;
  });

  if(!valid){ toast('Veuillez remplir les champs obligatoires (*).'); return; }

  data.updatedBy = session.fullName;
  data.updatedAt = new Date().toISOString();

  if(idx>=0) members[idx] = data; else members.push(data);
  setMembers(members);
  toast(idx>=0 ? 'Membre modifié avec succès.' : 'Membre inscrit avec succès.');
  nav('#/membres/'+id);
}
