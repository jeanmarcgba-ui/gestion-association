<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Gestion Association</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Association">
<meta name="mobile-web-app-capable" content="yes">
<meta id="themeColorMeta" name="theme-color" content="#0E1F3A">

<link rel="apple-touch-icon" id="appleTouchIcon" href="">
<link rel="manifest" id="webManifest" href="">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --bg:#C7CBD1;
  --surface:#FFFFFF;
  --ink:#1B2B22;
  --ink-soft:#5B6B60;
  --primary:#21503C;
  --primary-light:#3C7A5C;
  --primary-dark:#153327;
  --navy:#0E1F3B;
  --navy-light:#1B3560;
  --navy-soft:#2A4A80;
  --accent:#C9932F;
  --accent-soft:#F0E1BE;
  --danger:#B3432B;
  --border:#D3D7DC;
  --radius:14px;
  --shadow:0 4px 18px rgba(14,31,59,0.12);
  --font-display:'Fraunces',serif;
  --font-body:'Work Sans',sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--ink);
  min-height:100vh;
  min-height:100dvh;
  -webkit-tap-highlight-color:transparent;
}
h1,h2,h3,.display{font-family:var(--font-display);color:var(--primary-dark);}
button{font-family:var(--font-body);cursor:pointer;}
a{color:inherit;}
img{max-width:100%;display:block;}
::selection{background:var(--accent-soft);}

/* ---------- Layout shells ---------- */
#app{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;}
.hidden{display:none !important;}

/* ---------- Login ---------- */
.login-screen{
  min-height:100vh;min-height:100dvh;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 15% 10%, #1B3560 0%, var(--navy) 55%, #060F1F 100%);
  padding:24px;
  position:relative;
  overflow:hidden;
}
.login-screen::before{
  content:"";position:absolute;top:-120px;right:-120px;width:340px;height:340px;border-radius:50%;
  background:radial-gradient(circle, rgba(201,147,47,0.18) 0%, transparent 70%);
}
.login-screen::after{
  content:"";position:absolute;bottom:-140px;left:-100px;width:320px;height:320px;border-radius:50%;
  background:radial-gradient(circle, rgba(33,80,60,0.35) 0%, transparent 70%);
}
.login-card{
  background:var(--surface);
  width:100%;max-width:380px;
  border-radius:20px;
  padding:36px 30px 30px;
  box-shadow:0 20px 60px rgba(0,0,0,0.45);
  text-align:center;
  position:relative;
  z-index:1;
  border-top:4px solid var(--accent);
}
.login-emblem{
  width:68px;height:68px;border-radius:18px;margin:0 auto 18px;
  background:var(--navy);display:flex;align-items:center;justify-content:center;
  overflow:hidden;box-shadow:0 0 0 3px var(--accent-soft);
}
.login-emblem img{width:100%;height:100%;object-fit:cover;}
.login-emblem svg{width:34px;height:34px;}
.login-card h1{font-size:22px;margin:0 0 4px;}
.login-card p.sub{color:var(--ink-soft);font-size:13.5px;margin:0 0 26px;}
.field{text-align:left;margin-bottom:14px;}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;letter-spacing:.02em;text-transform:uppercase;}
.field input,.field select,.field textarea{
  width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid var(--border);
  font-family:var(--font-body);font-size:15px;background:#FCFBF8;color:var(--ink);
  transition:border-color .15s;
}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--primary-light);}
.field small.hint{display:block;margin-top:5px;color:var(--ink-soft);font-size:11.5px;}
.btn{
  border:none;border-radius:10px;padding:12px 20px;font-weight:600;font-size:14.5px;
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  transition:transform .12s, box-shadow .12s, background .15s;
}
.btn:active{transform:scale(0.97);}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 3px 10px rgba(33,80,60,0.3);}
.btn-primary:hover{background:var(--primary-light);}
.btn-accent{background:var(--accent);color:#3A2A05;}
.btn-ghost{background:transparent;color:var(--primary);border:1.5px solid var(--border);}
.btn-danger{background:var(--danger);color:#fff;border:none;}
.btn-danger:hover{background:#C24E33;}
.btn-edit{background:#2B6CB0;color:#fff;border:none;}
.btn-edit:hover{background:#3579C4;}
.btn-sm{padding:7px 13px;font-size:12.5px;}
.btn-navy{background:var(--navy);color:#fff;}
.btn-navy:hover{background:var(--navy-light);}
.btn-beige{background:var(--accent-soft);color:#5B4A1E;}
.btn-beige:hover{background:#E9D6A3;}
.btn-block{width:100%;}
.login-error{color:var(--danger);font-size:13px;margin-top:10px;min-height:16px;}
.login-foot{margin-top:22px;font-size:11.5px;color:var(--ink-soft);}

/* ---------- Locked screen ---------- */
.lock-screen{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;background:var(--primary-dark);padding:24px;text-align:center;}
.lock-card{background:var(--surface);border-radius:20px;padding:40px 30px;max-width:420px;}
.lock-card h1{font-size:24px;}
.lock-card p{color:var(--ink-soft);font-size:14.5px;line-height:1.6;}

/* ---------- Shell (post-login) ---------- */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:60;
  background:var(--navy);border-bottom:1px solid var(--navy-light);
  display:flex;align-items:center;gap:12px;padding:12px 18px;
  padding-top:calc(12px + env(safe-area-inset-top));
  color:#fff;
}
.topbar-spacer{height:64px;padding-top:env(safe-area-inset-top);flex-shrink:0;}
.topbar .brand{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
.topbar .brand-logo{width:36px;height:36px;border-radius:9px;background:#fff;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.topbar .brand-logo img{width:100%;height:100%;object-fit:cover;}
.topbar .brand-name{font-family:var(--font-display);font-weight:600;font-size:16.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;}
.topbar .menu-btn{display:none;background:none;border:none;padding:8px;color:#fff;}
.user-pill{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.12);border-radius:30px;padding:5px 12px 5px 5px;font-size:13px;font-weight:600;flex-shrink:0;color:#fff;}
.user-pill .dot{width:26px;height:26px;border-radius:50%;background:var(--accent);color:#3A2A05;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
.topbar .btn-ghost{background:rgba(255,255,255,0.1);color:#fff;border:1.5px solid rgba(255,255,255,0.25);}
.btn-topbar-sync,.btn-topbar-logout{
  padding:9px 14px;border:none;font-weight:600;font-size:13px;
}
.btn-topbar-sync{background:#2B6CB0;color:#fff;}
.btn-topbar-sync:hover{background:#3579C4;}
.btn-topbar-logout{background:var(--danger);color:#fff;}
.btn-topbar-logout:hover{background:#C24E33;}
.btn-topbar-sync svg,.btn-topbar-logout svg{width:16px;height:16px;flex-shrink:0;}
.btn-label{white-space:nowrap;}
@media (max-width:600px){
  .btn-label{display:none;}
  .btn-topbar-sync,.btn-topbar-logout{padding:9px 11px;}
}
.topbar .btn-ghost:hover{background:rgba(255,255,255,0.18);}

.shell{display:flex;flex:1;min-height:0;}
.sidenav{
  width:230px;flex-shrink:0;background:var(--navy);border-right:1px solid var(--navy-light);
  padding:18px 12px;display:flex;flex-direction:column;gap:2px;
}
.sidenav a{
  display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;
  font-size:14px;font-weight:500;color:rgba(255,255,255,0.65);text-decoration:none;
  position:relative;
}
.sidenav a svg{width:18px;height:18px;flex-shrink:0;}
.sidenav a.active{background:var(--accent);color:#3A2A05;}
.sidenav a:not(.active):hover{background:rgba(255,255,255,0.08);color:#fff;}
.nav-badge{
  margin-left:auto;background:var(--danger);color:#fff;font-size:10.5px;font-weight:700;
  min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px;
}
.sidenav-logo{
  margin-top:auto;padding-top:16px;border-top:1px solid var(--navy-light);
  display:flex;align-items:center;gap:9px;
}
.sidenav-logo img{width:30px;height:30px;border-radius:8px;object-fit:cover;flex-shrink:0;}
.sidenav-logo span{font-size:11.5px;color:rgba(255,255,255,0.55);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bottomnav a{position:relative;}
.bottomnav a .nav-badge{position:absolute;top:2px;right:10px;margin-left:0;}
.sidenav .divider{height:1px;background:var(--navy-light);margin:10px 4px;}
.sidenav .section-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:rgba(255,255,255,0.45);padding:10px 12px 4px;font-weight:700;}

main{flex:1;min-width:0;padding:26px 30px 60px;overflow-y:auto;}
.page-head{margin-bottom:22px;}
.page-head h1{font-size:25px;margin:0 0 4px;}
.page-head p{color:var(--ink-soft);margin:0;font-size:14px;}

.welcome-banner{
  background:linear-gradient(120deg, var(--primary-dark) 0%, var(--primary) 100%);
  border-radius:var(--radius);
  padding:26px 28px;
  margin-bottom:22px;
  color:#fff;
  position:relative;
  overflow:hidden;
}
.welcome-banner h1{color:#fff;margin:0 0 6px;}
.welcome-banner p{color:rgba(255,255,255,0.82);margin:0;font-size:14px;}
.welcome-banner::after{
  content:"";position:absolute;top:-40px;right:-40px;width:150px;height:150px;border-radius:50%;
  background:rgba(255,255,255,0.06);
}

.announcement-banner{
  background:#7A1F2B;
  color:#fff;
  border:2px solid var(--navy);
  border-radius:10px;
  padding:12px 16px;
  margin-bottom:14px;
  font-size:14px;
  font-weight:700;
  line-height:1.35;
  cursor:pointer;
  box-shadow:0 4px 12px rgba(122,31,43,0.3);
  transition:transform .12s;
}
.announcement-banner:hover{transform:translateY(-1px);}
.announcement-banner:active{transform:scale(0.99);}

.card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;margin-bottom:18px;}
.grid{display:grid;gap:16px;}
.grid-2{grid-template-columns:1fr 1fr;}
.grid-3{grid-template-columns:repeat(3,1fr);}
.stat{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px;}
.stat .n{font-family:var(--font-display);font-size:30px;color:var(--primary);font-weight:600;}
.stat .l{font-size:12.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.03em;font-weight:600;}

/* Member card / signature element */
.member-card{
  background:linear-gradient(135deg,#fff 0%, #FBF9F3 100%);
  border:1px solid var(--border);border-radius:16px;padding:16px;
  display:flex;gap:14px;align-items:center;cursor:pointer;transition:box-shadow .15s, transform .15s;
  position:relative;overflow:hidden;
}
.member-card:hover{box-shadow:0 8px 22px rgba(27,43,34,0.12);transform:translateY(-2px);}
.member-card::after{
  content:"";position:absolute;top:0;right:0;bottom:0;width:6px;background:var(--accent);
}
.member-photo{width:52px;height:52px;border-radius:12px;object-fit:cover;background:var(--bg);flex-shrink:0;border:2px solid var(--surface);box-shadow:0 0 0 1px var(--border);}
.member-photo.placeholder{display:flex;align-items:center;justify-content:center;color:var(--primary);font-family:var(--font-display);font-weight:600;font-size:18px;}
.member-info{min-width:0;flex:1;}
.member-info .name{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.member-info .role{font-size:12.5px;color:var(--ink-soft);}
.badge{display:inline-block;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.02em;}
.badge-ok{background:#E3EEE6;color:var(--primary);}
.badge-warn{background:#FBEAD9;color:#95491A;}

.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:18px;}
.search-input{flex:1;min-width:180px;}
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -4px;padding:0 4px;}
table{width:100%;border-collapse:collapse;font-size:14px;min-width:600px;}
table th{text-align:left;font-size:11.5px;text-transform:uppercase;color:var(--ink-soft);padding:8px 10px;border-bottom:2px solid var(--border);white-space:nowrap;}
table td{padding:10px;border-bottom:1px solid var(--border);}
table tr:hover td{background:var(--bg);}
@media (max-width:700px){
  .table-scroll{position:relative;}
  .table-scroll::after{
    content:"→ Faites glisser pour voir plus";
    display:block;text-align:center;font-size:11px;color:var(--ink-soft);padding:6px 0 2px;
  }
  table{font-size:12.5px;min-width:560px;}
  table th{padding:7px 8px;font-size:10px;}
  table td{padding:8px;}
}

.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--primary-dark);color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;
  box-shadow:0 10px 30px rgba(0,0,0,0.25);z-index:100;opacity:0;pointer-events:none;transition:all .25s;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto;}

.modal-backdrop{position:fixed;inset:0;background:rgba(15,36,27,0.55);display:flex;align-items:center;justify-content:center;z-index:80;padding:20px;}
.modal{background:var(--surface);border-radius:18px;max-width:520px;width:100%;max-height:88vh;overflow-y:auto;padding:26px;}
.modal h2{margin-top:0;font-size:19px;}

.file-drop{border:2px dashed var(--border);border-radius:12px;padding:16px;text-align:center;font-size:13px;color:var(--ink-soft);cursor:pointer;position:relative;}
.file-drop.has-file{border-color:var(--primary-light);background:var(--bg);}
.file-drop input{position:absolute;inset:0;opacity:0;cursor:pointer;}
.file-thumb{width:70px;height:70px;object-fit:cover;border-radius:10px;margin:0 auto 6px;}
#dropProfilePhoto .file-thumb{width:20px;height:20px;border-radius:50%;margin:0;display:inline-block;vertical-align:middle;}

.summary-block{margin-bottom:18px;}
.summary-block h3{font-size:13px;text-transform:uppercase;letter-spacing:.03em;color:var(--primary);border-bottom:1px solid var(--border);padding-bottom:6px;margin-bottom:10px;}
.summary-row{display:flex;justify-content:space-between;padding:5px 0;font-size:14px;border-bottom:1px dashed #EEEBE0;}
.summary-row .k{color:var(--ink-soft);}
.summary-row .v{font-weight:600;text-align:right;}

.tabs{display:flex;gap:6px;border-bottom:1px solid var(--border);margin-bottom:20px;flex-wrap:wrap;}
.tabs button{background:none;border:none;padding:10px 16px;font-size:14px;font-weight:600;color:var(--ink-soft);border-bottom:2px solid transparent;}
.tabs button.active{color:var(--primary);border-color:var(--primary);}

.locked-banner{background:#FBEAD9;color:#1B2B22;padding:10px 16px;border-radius:10px;font-size:13.5px;margin-bottom:18px;display:flex;align-items:center;gap:8px;}

.options-gate{max-width:400px;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
.options-gate-head{
  background:linear-gradient(135deg, var(--navy) 0%, #16294D 100%);
  padding:28px 26px 24px;text-align:center;color:#fff;
}
.options-gate-icon{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,0.1);box-shadow:0 0 0 3px var(--accent-soft);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;color:var(--accent);}
.options-gate-icon svg{width:24px;height:24px;}
.options-gate-head h2{margin:0 0 4px;font-size:18px;color:#fff;}
.options-gate-head p{margin:0;font-size:13px;color:rgba(255,255,255,0.7);}
.options-gate-body{background:var(--surface);padding:24px 26px 26px;}

/* Bottom nav (mobile) */
.bottomnav{display:none;position:sticky;bottom:0;background:var(--navy);border-top:1px solid var(--navy-light);padding:6px 4px calc(6px + env(safe-area-inset-bottom));z-index:40;}
.bottomnav-inner{display:flex;overflow-x:auto;gap:2px;}
.bottomnav a{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 12px;font-size:10.5px;color:rgba(255,255,255,0.6);text-decoration:none;font-weight:600;min-width:64px;}
.bottomnav a.active{color:var(--accent);}
.bottomnav a svg{width:20px;height:20px;}

@media (max-width:880px){
  .sidenav{display:none;}
  .topbar .menu-btn{display:block;}
  main{padding:18px 14px 90px;}
  .grid-2,.grid-3{grid-template-columns:1fr;}
  .bottomnav{display:block;}
}
.sidenav.drawer-open{
  display:flex;position:fixed;top:0;left:0;bottom:0;z-index:60;box-shadow:0 0 0 100vmax rgba(0,0,0,0.4);
  padding-top:calc(18px + env(safe-area-inset-top));
}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>
<script>
/* =========================================================
   Application de Gestion d'Association — Phase 1
   Connexion, Accueil, Gestion des membres, Options
   Stockage local (localStorage) — prêt pour bascule Supabase
   ========================================================= */

const LS = {

  campaigns: 'aa_campaigns',
  donations: 'aa_donations',

  announcements: 'aa_announcements'

const ICONS = {

  wallet: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2.5" y="6" width="19" height="13" rx="2.5"/><path d="M2.5 10h19"/><circle cx="17" cy="14" r="1.3" fill="currentColor" stroke="none"/></svg>`,
  chat: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a8 8 0 1 1 3.3 6.5L3 20l1.3-3.6A7.9 7.9 0 0 1 3 12Z"/></svg>`,
  calendar: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="16" rx="2.5"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>`,
  news: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 8h10M7 12h10M7 16h6"/></svg>`,

/* ---------------- Store helpers ---------------- */
// Stockage sécurisé : utilise localStorage si disponible, sinon un repli en mémoire
// (évite une page blanche si le navigateur bloque localStorage, ex. certains cas file://)
const memoryStore = {};
let storageAvailable = true;
try{
  const testKey = '__aa_test__';
  localStorage.setItem(testKey, '1');
  localStorage.removeItem(testKey);
}catch(e){
  storageAvailable = false;
  console.warn('localStorage indisponible, utilisation d\'un stockage temporaire en mémoire. Les données ne seront pas conservées après fermeture de la page.');
}

function loadJSON(key, fallback){
  try{
    // Priorité au repli mémoire pour cette clé précise (utilisé si l'enregistrement
    // dans localStorage a échoué, ex. quota dépassé par des photos/documents volumineux)
    if(memoryStore[key] !== undefined) return JSON.parse(memoryStore[key]);
    if(storageAvailable){
      const v = localStorage.getItem(key);
      return v ? JSON.parse(v) : fallback;
    }
    return fallback;
  }catch(e){ return fallback; }
}
function saveJSON(key, val, fromRemote){
  let quotaExceeded = false;
  try{
    if(storageAvailable){
      localStorage.setItem(key, JSON.stringify(val));
      delete memoryStore[key]; // l'enregistrement a réussi : on retire l'éventuel repli précédent
    }
    else{ memoryStore[key] = JSON.stringify(val); }
  }catch(e){
    memoryStore[key] = JSON.stringify(val);
    quotaExceeded = true;
    console.warn('Stockage local plein, données conservées temporairement en mémoire uniquement :', key, e);
  }

  if(quotaExceeded){
    toast("Stockage du navigateur plein : cet élément n'a pas pu être enregistré durablement. Pensez à libérer de l'espace (ex. supprimer d'anciennes photos) ou synchronisez rapidement avec Supabase.");
  }

  if(!fromRemote && typeof SYNC_KEYS !== 'undefined' && SYNC_KEYS.includes(key)){
    const ts = new Date().toISOString();
    setLocalTimestamp(key, ts);
    supabasePush(key, val, ts);
  }
}

// confirmés par la trésorerie — jamais modifié manuellement, pour rester toujours exact.
// En repli, si l'identifiant ne correspond pas (ex. décalage entre appareils avant
// synchronisation complète), on retrouve le paiement par nom + prénom du membre.
function isMemberCotisationAJour(memberId){
  const payments = getPayments();
  if(payments.some(p => p.memberId===memberId && p.type==='cotisation' && p.status==='confirme')) return true;

  const member = getMembers().find(m=>m.id===memberId);
  if(!member) return false;
  const fullName = `${member.prenom||''} ${member.nom||''}`.trim().toLowerCase();
  if(!fullName) return false;
  return payments.some(p => p.type==='cotisation' && p.status==='confirme' && (p.memberName||'').trim().toLowerCase()===fullName);
}

  const remote = await supabasePull(LS.presence);
  const presence = (remote && remote.value) ? remote.value : {};
  const now = new Date().toISOString();
  const prev = presence[session.username] || {};
  presence[session.username] = {
    fullName: session.fullName,
    role: session.role,
    lastActive: now,
    typing: !!opts.typing,
    typingAt: opts.typing ? now : prev.typingAt
  };
  saveJSON(LS.presence, presence, true);
  await supabasePush(LS.presence, presence, now);
}

  return (remote && remote.value) ? remote.value : {};
}

// Compresse une image côté navigateur avant stockage (pour limiter la taille en localStorage)
function compressImageFile(file, maxDim, quality){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      const img = new Image();
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w > maxDim || h > maxDim){
          if(w > h){ h = Math.round(h * maxDim / w); w = maxDim; }
          else{ w = Math.round(w * maxDim / h); h = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality||0.8));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function supabaseHeaders(){

    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,

  };
}

// Vérification légère : ne récupère que les dates de mise à jour (pas les données),
// pour savoir en un seul petit appel si une synchronisation complète est nécessaire.
async function supabasePullTimestamps(){
  try{
    const res = await fetch(`${SUPABASE_REST}/${SUPABASE_TABLE}?select=key,updated_at`, {
      headers: supabaseHeaders()
    });
    if(!res.ok) return {};
    const rows = await res.json();
    const map = {};
    rows.forEach(r=>{ map[r.key] = r.updated_at; });
    return map;
  }catch(e){
    console.warn('Supabase timestamps error', e);
    return {};
  }
}

async function supabasePull(key){
  try{
    const res = await fetch(`${SUPABASE_REST}/${SUPABASE_TABLE}?key=eq.${encodeURIComponent(key)}&select=value,updated_at`, {
      headers: supabaseHeaders()
    });
    if(!res.ok) return null;
    const rows = await res.json();
    if(!rows.length) return null;
    return {value: rows[0].value, updatedAt: rows[0].updated_at};
  }catch(e){
    console.warn('Supabase pull error', key, e);
    return null;
  }
}

async function supabasePush(key, value, updatedAt){
  try{
    const res = await fetch(`${SUPABASE_REST}/${SUPABASE_TABLE}?on_conflict=key`, {
      method: 'POST',
      headers: {...supabaseHeaders(), 'Prefer': 'resolution=merge-duplicates,return=minimal'},
      body: JSON.stringify([{key, value, updated_at: updatedAt}])
    });
    return res.ok;
  }catch(e){
    console.warn('Supabase push error', key, e);
    return false;
  }
}

// Synchronisation en deux temps :
// 1) un seul petit appel pour comparer les dates de toutes les clés
// 2) téléchargement des données complètes UNIQUEMENT pour les clés qui ont réellement changé
async function syncAllFromRemote(){
  let anyRemoteNewer = false;
  const remoteTimestamps = await supabasePullTimestamps();

  for(const key of SYNC_KEYS){
    const localTs = getLocalTimestamp(key);
    const remoteTs = remoteTimestamps[key];

    if(remoteTs && (!localTs || new Date(remoteTs) > new Date(localTs))){
      // La version distante est plus récente : on télécharge les données complètes de cette clé
      const remote = await supabasePull(key);
      if(remote){
        saveJSON(key, remote.value, true);
        setLocalTimestamp(key, remote.updatedAt);
        anyRemoteNewer = true;
      }
    } else if(localTs && (!remoteTs || new Date(localTs) > new Date(remoteTs))){
      // La version locale est plus récente : on l'envoie vers Supabase
      const localVal = loadJSON(key, null);
      if(localVal !== null) await supabasePush(key, localVal, localTs);
    } else if(!remoteTs){
      // Aucune version distante n'existe encore : première synchronisation de cette clé
      const localVal = loadJSON(key, null);
      if(localVal !== null){
        const ts = localTs || new Date().toISOString();
        setLocalTimestamp(key, ts);
        await supabasePush(key, localVal, ts);
      }
    }
  }
  return anyRemoteNewer;
}

// Met à jour l'icône de l'onglet, l'icône iOS et le manifeste Android à partir du
// logo réellement configuré pour l'association, afin qu'"Ajouter à l'écran d'accueil"
// utilise le vrai logo plutôt qu'une icône générique.
function updateAppIcons(){
  const s = getSettings() || {};
  const logo = s.assocLogo || DEFAULT_LOGO;
  const name = s.assocName || 'Association';
  try{
    const favicon = document.getElementById('favicon');
    if(favicon) favicon.href = logo;
    const appleIcon = document.getElementById('appleTouchIcon');
    if(appleIcon) appleIcon.href = logo;
    const titleMeta = document.querySelector('meta[name="apple-mobile-web-app-title"]');
    if(titleMeta) titleMeta.setAttribute('content', name);
    document.title = name;

    const manifest = {
      name: name,
      short_name: name.slice(0, 20),
      start_url: '.',
      display: 'standalone',
      background_color: '#0E1F3A',
      theme_color: '#0E1F3A',
      icons: [
        {src: logo, sizes: '192x192', type: 'image/jpeg', purpose: 'any maskable'},
        {src: logo, sizes: '512x512', type: 'image/jpeg', purpose: 'any maskable'}
      ]
    };
    const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const manifestLink = document.getElementById('webManifest');
    if(manifestLink) manifestLink.href = url;
  }catch(e){ console.warn('Icon update error', e); }
}

function bootstrap(){
  if(!getSettings()){
    setSettings({
      assocName: 'Mon Association',
      assocLogo: DEFAULT_LOGO,
      expiryDate: '',
      montantAdhesion: 0,
      montantCotisation: 0,
      orangeMoney: '',
      moovMoney: '',
      mtnMoney: '',
      wave: ''
    }, true); // skipSync : on ne pousse pas ces valeurs par défaut avant d'avoir vérifié Supabase
  } else {
    const s = getSettings();
    if(!s.assocLogo){ s.assocLogo = DEFAULT_LOGO; setSettings(s, true); }
  }
  if(getUsers().length === 0){
    setUsers([{
      id: uid(), username: CREATOR_NAME, password: CREATOR_PASS,
      role: 'createur', fullName: 'Jean Marc', createdAt: new Date().toISOString()
    }], true); // skipSync : idem, en attente de la synchronisation initiale
  }
}

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function fmtDate(d){
  if(!d) return '—';
  const dt = new Date(d);
  if(isNaN(dt)) return d;
  return dt.toLocaleDateString('fr-FR', {day:'2-digit', month:'2-digit', year:'numeric'});
}
function fmtDateTime(d){
  const dt = new Date(d);
  if(isNaN(dt)) return '—';
  return dt.toLocaleDateString('fr-FR') + ' à ' + dt.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
}
function initials(name){
  return (name||'?').split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');
}
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>t.classList.remove('show'), 2600);
}
function escapeHtml(s){
  return (s==null?'':String(s)).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------------- App locking (expiry) ---------------- */
function isAppLocked(){
  const s = getSettings();
  if(!s || !s.expiryDate) return true; // tant que la période n'est pas définie, app verrouillée aux non-créateurs pour la saisie
  const today = new Date(); today.setHours(0,0,0,0);
  const end = new Date(s.expiryDate); end.setHours(0,0,0,0);
  if(today > end) return true;
  if(s.usageStartDate){
    const start = new Date(s.usageStartDate); start.setHours(0,0,0,0);
    if(today < start) return true;
  }
  return false;
}
function isExpiryUnset(){
  const s = getSettings();
  return !s || !s.expiryDate;
}

/* ---------------- Router ---------------- */
window.addEventListener('hashchange', render);
window.addEventListener('DOMContentLoaded', ()=>{
  bootstrap();
  updateAppIcons();
  // La connexion est obligatoire à chaque ouverture de l'application :
  // on efface toute session précédente au démarrage.
  try{ localStorage.removeItem(LS.session); }catch(e){}
  delete memoryStore[LS.session];
  location.hash = '#/accueil';
  render();

  // Synchronisation avec Supabase en arrière-plan (n'empêche pas l'affichage immédiat)
  runSync();

  // Synchronisation automatique périodique (toutes les 30 secondes, seulement si l'onglet est visible)
  setInterval(()=>{
    if(document.visibilityState === 'visible'){ runSync(); }
  }, 30000);
});

let syncInProgress = false;
function runSync(){
  if(syncInProgress) return;
  syncInProgress = true;
  const btn = document.getElementById('syncBtn');
  if(btn) btn.style.opacity = '0.5';
  syncAllFromRemote().then(hasUpdates=>{
    syncInProgress = false;
    if(btn) btn.style.opacity = '1';
    if(hasUpdates){ updateAppIcons(); render(); toast('Données mises à jour.'); }
  }).catch(e=>{
    syncInProgress = false;
    if(btn) btn.style.opacity = '1';
    console.warn('Sync error', e);
  });
}
function manualSync(){
  toast('Synchronisation en cours...');
  runSync();
}

function currentRoute(){
  const h = location.hash.replace(/^#\//,'') || 'accueil';
  const [path, ...rest] = h.split('/');
  return {path, param: rest.join('/')};
}

/* ---------------- MAIN RENDER ---------------- */
function render(){
  try{
    renderInner();
  }catch(err){
    console.error('Erreur application:', err);
    const app = document.getElementById('app');
    if(app){
      app.innerHTML = `
        <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;font-family:sans-serif;background:#F6F4EC;">
          <div style="background:#fff;border-radius:16px;padding:28px;max-width:460px;box-shadow:0 10px 30px rgba(0,0,0,0.12);">
            <h2 style="margin-top:0;color:#B3432B;">Une erreur est survenue</h2>
            <p style="color:#5B6B60;font-size:14px;">L'application a rencontré un problème inattendu. Essayez de recharger la page.</p>
            <p style="font-family:monospace;font-size:12px;background:#F6F4EC;padding:10px;border-radius:8px;color:#333;word-break:break-word;">${escapeHtml(err.message)}</p>
            <button onclick="location.reload()" style="margin-top:10px;padding:10px 18px;border:none;border-radius:8px;background:#21503C;color:#fff;font-weight:600;cursor:pointer;">Recharger</button>
          </div>
        </div>`;
    }
  }
}

function renderInner(){
  const app = document.getElementById('app');
  const session = getSession();

  if(!session){
    app.innerHTML = renderLogin();
    attachLoginEvents();
    return;
  }

  const {path} = currentRoute();

  // App-wide lock (expired), only creator may pass, and only to Options
  if(isAppLocked() && session.role !== 'createur' && path !== 'options'){
    app.innerHTML = renderLockScreen();
    return;
  }

  app.innerHTML = renderShell(session, path);
  attachShellEvents(session);
  renderPage(path, session);
}

function renderLogin(){
  const s = getSettings() || {};
  return `
  <div class="login-screen">
    <div class="login-card">
      <div class="login-emblem"><img src="${DEFAULT_LOGO}" alt="logo"></div>

      <form id="loginForm">
        <div class="field">
          <label>Nom d'utilisateur</label>
          <input type="text" id="loginUser" autocomplete="username" required>
        </div>
        <div class="field">
          <label>Mot de passe</label>
          <input type="password" id="loginPass" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Se connecter</button>
        <div class="login-error" id="loginError"></div>
      </form>
      <div class="login-foot">Application de gestion associative — accès protégé<br><span style="opacity:.6;">Version 2026-07-07-E</span></div>
    </div>
  </div>`;
}
function attachLoginEvents(){
  document.getElementById('loginForm').addEventListener('submit', e=>{
    e.preventDefault();
    const u = document.getElementById('loginUser').value.trim();
    const p = document.getElementById('loginPass').value;
    const users = getUsers();
    const found = users.find(x=>x.username.toLowerCase()===u.toLowerCase() && x.password===p);
    const errEl = document.getElementById('loginError');
    if(found){
      setSession({username:found.username, role:found.role, fullName:found.fullName||found.username, userId:found.id, loginAt:new Date().toISOString()});
      errEl.textContent='';
      location.hash = '#/accueil';
      render();
    } else {
      errEl.textContent = "Nom d'utilisateur ou mot de passe incorrect.";
    }
  });
}

function attachShellEvents(){
  const menuBtn = document.getElementById('menuBtn');
  const sidenav = document.getElementById('sidenav');
  if(menuBtn){
    menuBtn.addEventListener('click', ()=>{
      sidenav.classList.toggle('drawer-open');
    });
  }
  document.addEventListener('click', function closeDrawer(e){
    if(sidenav && sidenav.classList.contains('drawer-open') && !sidenav.contains(e.target) && e.target!==menuBtn){
      sidenav.classList.remove('drawer-open');
    }
  }, {once:true});
}

    membres: pageMembresRouter,

    forum: pageForum,

function exportAnnouncementPDF(id){
  const a = getAnnouncements().find(x=>x.id===id);
  if(!a) return;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:'pt', format:'a4'});
  let {y, margin, pageWidth} = pdfDrawHeader(doc, 'Notification');
  doc.setFont('helvetica','bold'); doc.setFontSize(13); doc.setTextColor(21,51,39);
  doc.text('Instructions', margin, y); y += 26;
  doc.setFont('helvetica','normal'); doc.setFontSize(11); doc.setTextColor(27,43,34);
  const lines = doc.splitTextToSize(a.message, pageWidth - margin*2);
  doc.text(lines, margin, y);
  doc.save('notification.pdf');
}

// Aperçu générique : affiche le fichier choisi (image ou nom de fichier) directement
// dans la zone où l'utilisateur a cliqué, avant même l'enregistrement.
// Important : on ne touche JAMAIS à l'élément <input> lui-même (sinon le fichier
// sélectionné serait perdu) — on met à jour uniquement le texte d'aperçu à côté.
function wireFilePreview(inputId, labelId){
  const input = document.getElementById(inputId);
  const label = document.getElementById(labelId);
  if(!input || !label) return;
  input.addEventListener('change', ()=>{
    const file = input.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ()=>{
      const content = label.querySelector('.file-drop-content');
      if(!content) return;
      if(file.type.startsWith('image/')){
        content.innerHTML = `<img src="${reader.result}" class="file-thumb">${escapeHtml(file.name)} — cliquer pour changer`;
      } else {
        content.innerHTML = `${ICONS.docs} ${escapeHtml(file.name)} — cliquer pour changer`;
      }
      label.classList.add('has-file');
    };
    reader.readAsDataURL(file);
  });
}

function attachFileDrop(key){
  const input = document.getElementById(`f_${key}`);
  const label = document.getElementById(`drop_${key}`);
  if(!input) return;
  input.addEventListener('change', ()=>{
    const file = input.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ()=>{
      input.dataset.value = reader.result;
      if(file.type.startsWith('image/')){
        label.innerHTML = `<img src="${reader.result}" class="file-thumb">Fichier ajouté — cliquer pour changer<input type="file" id="f_${key}" accept="image/*,.pdf">`;
      } else {
        label.innerHTML = `Fichier ajouté (${escapeHtml(file.name)}) — cliquer pour changer<input type="file" id="f_${key}" accept="image/*,.pdf">`;
      }
      label.classList.add('has-file');
      document.getElementById(`f_${key}`).dataset.value = reader.result;
      attachFileDrop(key);
    };
    reader.readAsDataURL(file);
  });
}

function memberPaymentsHtml(memberId){
  const payments = getPayments().filter(p=>p.memberId===memberId).slice().reverse();
  if(!payments.length) return '';
  const statusBadge = (st) => st==='confirme' ? `<span class="badge badge-ok">Confirmé</span>` : st==='rejete' ? `<span class="badge badge-warn" style="background:#F7DADA;color:var(--danger);">Rejeté</span>` : `<span class="badge badge-warn">En attente</span>`;
  return `
    <div style="margin-top:14px;">
      <h3 style="font-size:13px;text-transform:uppercase;letter-spacing:.03em;color:var(--primary);border-bottom:1px solid var(--border);padding-bottom:6px;margin-bottom:10px;">Historique des paiements déclarés</h3>
      ${payments.map(p=>`
        <div class="summary-row">
          <span class="k">${fmtDate(p.date)} · ${p.type==='cotisation'?'Cotisation':'Adhésion'} · ${escapeHtml(p.method)}</span>
          <span class="v">${fmtFCFA(p.amount)} ${statusBadge(p.status)}</span>
        </div>`).join('')}
    </div>`;
}

function updatePayAmountFromType(){
  const s = getSettings()||{};
  const type = document.getElementById('payType').value;
  const amountInput = document.getElementById('payAmount');
  if(amountInput) amountInput.value = type==='cotisation' ? (s.montantCotisation||'') : (s.montantAdhesion||'');
}

function declarePayment(session){
  const memberId = document.getElementById('payMemberId').value;
  const type = document.getElementById('payType').value;
  const amount = Number(document.getElementById('payAmount').value);
  const method = document.getElementById('payMethod').value;
  const reference = document.getElementById('payRef').value.trim();
  if(!amount){ toast('Veuillez indiquer un montant.'); return; }
  const member = getMembers().find(m=>m.id===memberId);
  const payments = getPayments();
  payments.push({
    id: uid(), memberId, memberName: member ? `${member.prenom} ${member.nom}` : '—',
    type, amount, method, reference, date: new Date().toISOString().slice(0,10),
    status: 'en_attente', declaredBy: session.fullName, declaredAt: new Date().toISOString()
  });
  setPayments(payments);
  toast('Paiement déclaré. Il sera validé par le trésorier.');
  render();
}

function confirmPayment(id){
  const payments = getPayments();
  const idx = payments.findIndex(p=>p.id===id);
  if(idx<0) return;
  const p = payments[idx];
  const session = getSession();
  p.status = 'confirme';
  p.confirmedBy = session.fullName;
  p.confirmedByRole = session.role;
  p.confirmedAt = new Date().toISOString();
  setPayments(payments);

  // Mettre à jour le statut de cotisation du membre si applicable
  if(p.type==='cotisation'){
    const members = getMembers();
    const mIdx = members.findIndex(m=>m.id===p.memberId);
    if(mIdx>=0){
      members[mIdx].cotisationStatus = 'a_jour';
      members[mIdx].updatedBy = session.fullName;
      members[mIdx].updatedAt = new Date().toISOString();
      setMembers(members);
    }
  }

  // Enregistrer automatiquement comme recette en comptabilité
  const entries = getAccounting();
  const entryId = uid();
  entries.push({
    id: entryId, type:'recette', amount: p.amount, source: p.type,
    description: `${p.type==='cotisation'?'Cotisation':'Adhésion'} — ${p.memberName} (${p.method})`,
    date: p.date, recordedBy: session.fullName, recordedByRole: session.role, recordedAt: new Date().toISOString()
  });
  setAccounting(entries);
  p.accountingEntryId = entryId;
  setPayments(payments);

  toast('Paiement confirmé et enregistré en comptabilité.');
  render();
}

function rejectPayment(id){
  if(!confirm('Rejeter cette déclaration de paiement ?')) return;
  const payments = getPayments();
  const idx = payments.findIndex(p=>p.id===id);
  if(idx<0) return;
  const session = getSession();
  payments[idx].status = 'rejete';
  payments[idx].confirmedBy = session.fullName;
  payments[idx].confirmedByRole = session.role;
  payments[idx].confirmedAt = new Date().toISOString();
  setPayments(payments);
  toast('Paiement rejeté.');
  render();
}

function deletePayment(id){
  const p = getPayments().find(x=>x.id===id);
  if(!p) return;
  const warn = p.status==='confirme'
    ? 'Ce paiement est confirmé : le supprimer retirera aussi le montant correspondant de la comptabilité. Continuer ?'
    : 'Supprimer cette déclaration de paiement ?';
  if(!confirm(warn)) return;
  // Retirer l'écriture comptable liée si elle existe, pour garder la caisse cohérente
  if(p.accountingEntryId){
    setAccounting(getAccounting().filter(e=>e.id!==p.accountingEntryId));
  }
  setPayments(getPayments().filter(x=>x.id!==id));
  toast('Paiement supprimé.');
  render();
}

function saveEditedPayment(id){
  const session = getSession();
  const payments = getPayments();
  const idx = payments.findIndex(p=>p.id===id);
  if(idx<0) return;
  const p = payments[idx];
  const newMemberId = document.getElementById('editPayMember').value;
  const member = getMembers().find(m=>m.id===newMemberId);
  if(member){
    p.memberId = newMemberId;
    p.memberName = `${member.prenom} ${member.nom}`;
  }
  p.type = document.getElementById('editPayType').value;
  p.amount = Number(document.getElementById('editPayAmount').value)||0;
  p.method = document.getElementById('editPayMethod').value;
  p.reference = document.getElementById('editPayRef').value.trim();
  p.date = document.getElementById('editPayDate').value;
  p.editedBy = session.fullName;
  p.editedByRole = session.role;
  p.editedAt = new Date().toISOString();
  setPayments(payments);

  // Si ce paiement est déjà confirmé et lié à une écriture comptable, la mettre à jour aussi
  if(p.accountingEntryId){
    const entries = getAccounting();
    const eIdx = entries.findIndex(e=>e.id===p.accountingEntryId);
    if(eIdx>=0){
      entries[eIdx].amount = p.amount;
      entries[eIdx].source = p.type;
      entries[eIdx].description = `${p.type==='cotisation'?'Cotisation':'Adhésion'} — ${p.memberName} (${p.method})`;
      entries[eIdx].date = p.date;
      setAccounting(entries);
    }
  }

  closeEditPaymentModal();
  toast('Paiement modifié.');
  render();
}

function registerPayment(session){
  const memberId = document.getElementById('rpMember').value;
  const type = document.getElementById('rpType').value;
  const amount = Number(document.getElementById('rpAmount').value);
  const method = document.getElementById('rpMethod').value;
  const reference = document.getElementById('rpRef').value.trim();
  if(!memberId){ toast('Veuillez choisir un membre.'); return; }
  if(!amount){ toast('Veuillez indiquer un montant.'); return; }
  const member = getMembers().find(m=>m.id===memberId);
  const now = new Date().toISOString();
  const paymentId = uid();
  const entryId = uid();
  const payments = getPayments();
  payments.push({
    id: paymentId, memberId, memberName: member ? `${member.prenom} ${member.nom}` : '—',
    type, amount, method, reference, date: now.slice(0,10),
    status: 'confirme',
    declaredBy: session.fullName, declaredAt: now,
    confirmedBy: session.fullName, confirmedByRole: session.role, confirmedAt: now,

  });

      members[mIdx].cotisationStatus = 'a_jour';
      members[mIdx].updatedBy = session.fullName;
      members[mIdx].updatedAt = now;

  });

/* ================= COMPTABILITÉ (Phase 2) ================= */
let comptaTab = 'apercu';

/* ---- Filtre par mois/année pour les historiques de comptabilité ---- */
let comptaPeriodFilters = { paiements: {year:'', month:''}, mouvements: {year:'', month:''}, recettes: {year:'', month:''} };
const MONTH_NAMES = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

function filterByPeriod(list, dateField, section){
  const f = comptaPeriodFilters[section];
  if(!f.year && !f.month) return list;
  return list.filter(item=>{
    if(!item[dateField]) return true;
    const d = new Date(item[dateField]);
    if(isNaN(d)) return true;
    if(f.year && d.getFullYear() !== Number(f.year)) return false;
    if(f.month && (d.getMonth()+1) !== Number(f.month)) return false;
    return true;
  });
}

function periodFilterHtml(section, allItems, dateField){
  const f = comptaPeriodFilters[section];
  const years = [...new Set(allItems.map(i=>{
    const d = new Date(i[dateField]);
    return isNaN(d) ? null : d.getFullYear();
  }).filter(Boolean))].sort((a,b)=>b-a);
  return `
  <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:14px;">
    <div class="field" style="margin:0;min-width:130px;">
      <label>Année</label>
      <select onchange="setComptaPeriodFilter('${section}','year',this.value)">
        <option value="">Toutes</option>
        ${years.map(y=>`<option value="${y}" ${String(f.year)===String(y)?'selected':''}>${y}</option>`).join('')}
      </select>
    </div>
    <div class="field" style="margin:0;min-width:150px;">
      <label>Mois</label>
      <select onchange="setComptaPeriodFilter('${section}','month',this.value)">
        <option value="">Tous</option>
        ${MONTH_NAMES.map((mo,i)=>`<option value="${i+1}" ${String(f.month)===String(i+1)?'selected':''}>${mo}</option>`).join('')}
      </select>
    </div>
    ${(f.year||f.month) ? `<button class="btn btn-ghost" onclick="clearComptaPeriodFilter('${section}')">Réinitialiser</button>` : ''}
  </div>`;
}
function setComptaPeriodFilter(section, field, value){
  comptaPeriodFilters[section][field] = value;
  render();
}
function clearComptaPeriodFilter(section){
  comptaPeriodFilters[section] = {year:'', month:''};
  render();
}

function computeAccountingTotals(){
  const members = getMembers();
  const entries = getAccounting();
  const cotisationsAJour = members.filter(m=>isMemberCotisationAJour(m.id)).length;

  // Catégorise chaque recette par sa source (le champ "source" est ajouté aux nouvelles
  // entrées ; pour les anciennes entrées sans ce champ, on déduit la catégorie depuis la description).
  const categorize = (e) => {
    if(e.source) return e.source;
    const d = (e.description||'');
    if(d.startsWith('Cotisation —')) return 'cotisation';
    if(d.startsWith('Adhésion —')) return 'adhesion';
    if(d.startsWith('Don —')) return 'don';
    if(d.startsWith('Vente boutique —')) return 'boutique';
    return 'manuel';
  };

  const recetteEntries = entries.filter(e=>e.type==='recette');
  const sumBySource = (src) => recetteEntries.filter(e=>categorize(e)===src).reduce((sum,e)=>sum+Number(e.amount||0),0);

  const totalCotisations = sumBySource('cotisation');
  const totalAdhesions = sumBySource('adhesion');
  const totalDons = sumBySource('don');
  const totalBoutique = sumBySource('boutique');
  const totalRecettesManuelles = sumBySource('manuel');

  const totalDepenses = entries.filter(e=>e.type==='depense').reduce((sum,e)=>sum+Number(e.amount||0),0);
  const totalAchats = entries.filter(e=>e.type==='achat').reduce((sum,e)=>sum+Number(e.amount||0),0);

  // Source unique de vérité : le total des recettes est la somme réelle des entrées de comptabilité
  // (elles-mêmes créées uniquement au moment où la trésorerie confirme un paiement, un don ou une vente).
  const totalRecettes = recetteEntries.reduce((sum,e)=>sum+Number(e.amount||0),0);
  const totalSorties = totalDepenses + totalAchats;
  const solde = totalRecettes - totalSorties;

  return {cotisationsAJour, totalCotisations, totalAdhesions, totalDons, totalBoutique, totalRecettesManuelles, totalDepenses, totalAchats, totalRecettes, totalSorties, solde};
}

function fmtFCFA(n){
  return (Number(n)||0).toLocaleString('fr-FR') + ' FCFA';
}

function pageComptabilite(session){
  if(!['createur','tresoriere'].includes(session.role)){

      <div class="stat"><div class="n" style="color:${t.solde>=0?'var(--primary)':'var(--danger)'};">${fmtFCFA(t.solde)}</div><div class="l">Solde de caisse</div></div>

function saveAccountingEntry(type, prefix){
  const amount = Number(document.getElementById(prefix+'Amount').value);
  const description = document.getElementById(prefix+'Desc').value.trim();
  const date = document.getElementById(prefix+'Date').value;
  if(!amount || !description || !date){ toast('Veuillez remplir tous les champs.'); return; }
  const session = getSession();
  const entries = getAccounting();
  entries.push({
    id: uid(), type, amount, description, date, source: type==='recette' ? 'manuel' : undefined,
    recordedBy: session.fullName, recordedByRole: session.role, recordedAt: new Date().toISOString()
  });
  setAccounting(entries);
  toast('Enregistré avec succès.');
  render();
}

function deleteAccountingEntry(id){
  if(!confirm('Supprimer cette entrée ?')) return;
  setAccounting(getAccounting().filter(e=>e.id!==id));
  toast('Entrée supprimée.');
  render();
}

function editAccountingEntry(id){
  const e = getAccounting().find(x=>x.id===id);
  if(!e) return;
  const overlay = document.createElement('div');
  overlay.className = 'modal-backdrop';
  overlay.id = 'editEntryOverlay';
  overlay.innerHTML = `
    <div class="modal" style="max-width:420px;">
      <h2>Modifier l'entrée</h2>
      <div class="field"><label>Montant (FCFA)</label><input type="number" id="editEntryAmount" min="0" value="${e.amount}"></div>
      <div class="field"><label>Description</label><input type="text" id="editEntryDesc" value="${escapeHtml(e.description||'')}"></div>
      <div class="field"><label>Date</label><input type="date" id="editEntryDate" value="${e.date||''}"></div>
      <div style="display:flex;gap:10px;margin-top:6px;">
        <button class="btn btn-primary" onclick="saveEditedAccountingEntry('${id}')">Enregistrer</button>
        <button class="btn btn-ghost" onclick="closeEditEntryModal()">Annuler</button>
      </div>
    </div>`;
  overlay.addEventListener('click', ev=>{ if(ev.target===overlay) closeEditEntryModal(); });
  document.body.appendChild(overlay);
}
function closeEditEntryModal(){
  const el = document.getElementById('editEntryOverlay');
  if(el) el.remove();
}
function saveEditedAccountingEntry(id){
  const entries = getAccounting();
  const idx = entries.findIndex(e=>e.id===id);
  if(idx<0) return;
  const session = getSession();
  entries[idx].amount = Number(document.getElementById('editEntryAmount').value)||0;
  entries[idx].description = document.getElementById('editEntryDesc').value.trim();
  entries[idx].date = document.getElementById('editEntryDate').value;
  entries[idx].editedBy = session.fullName;
  entries[idx].editedByRole = session.role;
  entries[idx].editedAt = new Date().toISOString();
  setAccounting(entries);
  closeEditEntryModal();
  toast('Entrée modifiée.');
  render();
}

function savePaymentNumbers(){
  const s = getSettings()||{};
  s.orangeMoney = document.getElementById('numOrange').value.trim();
  s.moovMoney = document.getElementById('numMoov').value.trim();
  s.mtnMoney = document.getElementById('numMtn').value.trim();
  s.wave = document.getElementById('numWave').value.trim();
  setSettings(s);
  toast('Numéros de collecte enregistrés.');
  render();
}

/* ---- PDF export helpers for Comptabilité ---- */
function pdfDrawHeader(doc, subtitle){
  const s = getSettings()||{};
  const pageWidth = doc.internal.pageSize.getWidth();
  const margin = 42;
  doc.setFont('helvetica','bold'); doc.setFontSize(15); doc.setTextColor(33,80,60);
  doc.text(s.assocName || 'Association', margin, 50);
  doc.setFont('helvetica','normal'); doc.setFontSize(9.5); doc.setTextColor(120,120,120);
  let y = 66;
  if(s.assocPhone){ doc.text('Tél : ' + s.assocPhone, margin, y); y += 14; }
  doc.text(subtitle + ' — généré le ' + new Date().toLocaleDateString('fr-FR'), margin, y);
  if(s.assocLogo){
    try{ doc.addImage(s.assocLogo, pdfImageFormat(s.assocLogo), pageWidth-margin-46, 26, 46, 46); }catch(e){}
  }
  y += 16;
  doc.setDrawColor(226,223,209); doc.line(margin, y, pageWidth-margin, y);
  return {y: y+26, margin, pageWidth};
}

function pdfRow(doc, x, y, label, value, opts){
  opts = opts||{};
  doc.setFont('helvetica','bold'); doc.setFontSize(10.5); doc.setTextColor(90,100,95);
  doc.text(label, x, y);
  doc.setFont('helvetica','normal'); doc.setTextColor(opts.color ? opts.color[0] : 27, opts.color ? opts.color[1] : 43, opts.color ? opts.color[2] : 34);
  doc.text(String(value), x+260, y, {align:'right'});
}

function exportApercuPDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:'pt', format:'a4'});
  const t = computeAccountingTotals();
  const members = getMembers();
  let {y, margin} = pdfDrawHeader(doc, 'Bilan comptable');

  doc.setFont('helvetica','bold'); doc.setFontSize(12); doc.setTextColor(33,80,60);
  doc.text('Cotisations & adhésions', margin, y); y += 20;
  pdfRow(doc, margin, y, 'Membres inscrits', members.length); y += 18;
  pdfRow(doc, margin, y, 'Cotisations à jour', t.cotisationsAJour + ' membre(s)'); y += 18;
  pdfRow(doc, margin, y, 'Total cotisations perçues', fmtFCFA(t.totalCotisations)); y += 18;
  pdfRow(doc, margin, y, 'Total adhésions perçues', fmtFCFA(t.totalAdhesions)); y += 34;

  doc.setFont('helvetica','bold'); doc.setFontSize(12); doc.setTextColor(33,80,60);
  doc.text('Répartition', margin, y); y += 20;
  pdfRow(doc, margin, y, 'Cotisations', fmtFCFA(t.totalCotisations)); y += 18;
  pdfRow(doc, margin, y, 'Adhésions', fmtFCFA(t.totalAdhesions)); y += 18;
  pdfRow(doc, margin, y, 'Autres recettes', fmtFCFA(t.totalRecettesManuelles)); y += 18;
  pdfRow(doc, margin, y, 'Dépenses', '- ' + fmtFCFA(t.totalDepenses), {color:[179,67,43]}); y += 18;

function exportEntriesPDF(entries, title, filename, showType){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:'pt', format:'a4'});
  let {y, margin, pageWidth} = pdfDrawHeader(doc, title);

  const colDate = margin, colType = margin+70, colDesc = showType?margin+140:margin+70, colAmount = pageWidth-margin-70, colBy = pageWidth-margin-160;

  doc.setFont('helvetica','bold'); doc.setFontSize(9.5); doc.setTextColor(90,100,95);
  doc.text('Date', colDate, y);
  if(showType) doc.text('Type', colType, y);
  doc.text('Description', colDesc, y);
  doc.text('Par', colBy, y);
  doc.text('Montant', pageWidth-margin, y, {align:'right'});
  y += 8;
  doc.setDrawColor(226,223,209); doc.line(margin, y, pageWidth-margin, y);
  y += 16;

  let total = 0;
  doc.setFont('helvetica','normal'); doc.setFontSize(9.5); doc.setTextColor(27,43,34);
  if(!entries.length){
    doc.setTextColor(140,140,140);
    doc.text('Aucune entrée enregistrée.', margin, y);
    y += 18;
  }
  entries.forEach(e=>{
    total += Number(e.amount||0);
    doc.setTextColor(27,43,34);
    doc.text(fmtDate(e.date), colDate, y);
    if(showType) doc.text(e.type==='depense'?'Dépense':'Achat', colType, y);
    const descLines = doc.splitTextToSize(e.description||'', showType ? 170 : 240);
    doc.text(descLines, colDesc, y);
    doc.text(e.recordedBy||'—', colBy, y);
    doc.text(fmtFCFA(e.amount), pageWidth-margin, y, {align:'right'});
    y += Math.max(16, descLines.length*13);
    if(y > 770){ doc.addPage(); y = 60; }
  });

  y += 10;
  doc.setDrawColor(226,223,209); doc.line(margin, y, pageWidth-margin, y);
  y += 18;
  doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(21,51,39);
  doc.text('Total', colDesc, y);
  doc.text(fmtFCFA(total), pageWidth-margin, y, {align:'right'});

  doc.save(filename);
}

/* ---- Messages vocaux ---- */
const VOICE_MAX_SECONDS = 60;
let voiceRecorder = null;
let voiceChunks = [];
let voiceStream = null;
let voiceStartTime = null;
let voiceTimerInterval = null;

function pickVoiceMimeType(){
  const candidates = [
    'audio/webm;codecs=opus',
    'audio/mp4',
    'audio/webm',
    'audio/ogg;codecs=opus'
  ];
  if(window.MediaRecorder && MediaRecorder.isTypeSupported){
    for(const type of candidates){
      if(MediaRecorder.isTypeSupported(type)) return type;
    }
  }
  return ''; // laisse le navigateur choisir par défaut si rien n'est reconnu
}

async function startVoiceRecording(){
  if(!navigator.mediaDevices || !window.MediaRecorder){
    toast("Votre navigateur ne permet pas l'enregistrement vocal.");
    return;
  }
  try{
    voiceStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation:true, noiseSuppression:true, channelCount:1 }
    });
  }catch(e){
    toast("Impossible d'accéder au microphone. Sur mobile, l'application doit être ouverte via un lien https:// (pas un fichier local) pour autoriser le micro.");
    return;
  }
  voiceChunks = [];
  const mimeType = pickVoiceMimeType();
  voiceRecorder = mimeType ? new MediaRecorder(voiceStream, {mimeType}) : new MediaRecorder(voiceStream);
  voiceRecorder.ondataavailable = e => { if(e.data.size>0) voiceChunks.push(e.data); };
  voiceRecorder.start();
  voiceStartTime = Date.now();

  const bar = document.getElementById('voiceRecordBar');
  if(bar){ bar.style.display = 'flex'; bar.classList.remove('hidden'); }
  const btn = document.getElementById('voiceBtn');
  if(btn) btn.style.display = 'none';

  voiceTimerInterval = setInterval(()=>{
    const elapsed = Math.floor((Date.now()-voiceStartTime)/1000);
    const timerEl = document.getElementById('voiceTimer');
    if(timerEl){
      const mm = Math.floor(elapsed/60), ss = elapsed%60;
      timerEl.textContent = `${mm}:${ss<10?'0':''}${ss}`;
    }
    if(elapsed >= VOICE_MAX_SECONDS){ stopVoiceRecording(true); }
  }, 250);
}

function stopVoiceRecording(shouldSend){
  clearInterval(voiceTimerInterval);
  const bar = document.getElementById('voiceRecordBar');
  if(bar){ bar.style.display = 'none'; bar.classList.add('hidden'); }
  const btn = document.getElementById('voiceBtn');
  if(btn) btn.style.display = '';

  if(!voiceRecorder){ return; }
  const recorder = voiceRecorder;
  const stream = voiceStream;
  voiceRecorder = null;

  recorder.onstop = ()=>{
    if(stream){ stream.getTracks().forEach(t=>t.stop()); }
    if(shouldSend && voiceChunks.length){
      const blob = new Blob(voiceChunks, {type: recorder.mimeType || 'audio/webm'});
      const reader = new FileReader();
      reader.onload = ()=>{
        const session = getSession();
        const messages = getForum();
        messages.push({id:uid(), author:session.fullName, role:session.role, audio:reader.result, createdAt:new Date().toISOString()});
        setForum(messages);
        render();
        setTimeout(()=>{
          const thread = document.getElementById('forumThread');
          if(thread) thread.scrollTop = thread.scrollHeight;
        }, 30);
      };
      reader.readAsDataURL(blob);
    }
  };
  recorder.stop();
}

function dataURLtoBlob(dataurl){
  const arr = dataurl.split(',');
  const mimeMatch = arr[0].match(/:(.*?);/);
  const mime = mimeMatch ? mimeMatch[1] : '';
  const bstr = atob(arr[1]);
  let n = bstr.length;
  const u8arr = new Uint8Array(n);
  while(n--){ u8arr[n] = bstr.charCodeAt(n); }
  return new Blob([u8arr], {type:mime});
}
function openDocumentPreview(id){
  const doc = getDocumentsStore().find(d=>d.id===id);
  if(!doc) return;
  try{
    const blob = dataURLtoBlob(doc.file);
    const url = URL.createObjectURL(blob);
    window.open(url, '_blank');
  }catch(e){
    toast("Impossible d'ouvrir l'aperçu de ce document. Utilisez le bouton de téléchargement.");
  }
}
function uploadDocument(){
  const fileInput = document.getElementById('docFile');
  const file = fileInput.files[0];
  if(!file){ toast('Veuillez choisir un fichier.'); return; }
  if(file.size > 3.5*1024*1024){ toast('Fichier trop volumineux (max ~3 Mo).'); return; }
  const name = document.getElementById('docName').value.trim() || file.name;
  const reader = new FileReader();
  reader.onload = ()=>{
    const docs = getDocumentsStore();
    docs.push({id:uid(), name, filename:file.name, file:reader.result, uploadedBy:getSession().fullName, date:new Date().toISOString()});
    setDocumentsStore(docs);
    toast('Document ajouté.');
    render();
  };
  reader.readAsDataURL(file);
}

function declareDonation(session){
  const campaignId = document.getElementById('donCampaign').value;
  const campaign = campaignId ? getCampaigns().find(c=>c.id===campaignId) : null;
  const amount = Number(document.getElementById('donAmount').value);
  const method = document.getElementById('donMethod').value;
  const reference = document.getElementById('donRef').value.trim();
  if(!amount){ toast('Veuillez indiquer un montant.'); return; }
  const donations = getDonations();
  donations.push({
    id: uid(), donorName: session.fullName, campaignId: campaignId||null, campaignTitle: campaign?campaign.title:null,
    amount, method, reference, date: new Date().toISOString().slice(0,10),
    status:'en_attente', declaredBy: session.fullName, declaredAt: new Date().toISOString()
  });
  setDonations(donations);
  toast('Don déclaré. Il sera confirmé par le trésorier.');
  render();
}
function confirmDonation(id){
  const donations = getDonations();
  const idx = donations.findIndex(d=>d.id===id);
  if(idx<0) return;
  const d = donations[idx];
  const session = getSession();
  d.status = 'confirme';
  d.confirmedBy = session.fullName;
  d.confirmedAt = new Date().toISOString();
  setDonations(donations);

  const entries = getAccounting();
  entries.push({
    id: uid(), type:'recette', amount: d.amount, source: 'don',
    description: `Don — ${d.donorName}${d.campaignTitle?' ('+d.campaignTitle+')':''}`,
    date: d.date, recordedBy: session.fullName, recordedAt: new Date().toISOString()
  });
  setAccounting(entries);

  toast('Don confirmé et enregistré en comptabilité.');
  render();
}
function rejectDonation(id){
  if(!confirm('Rejeter ce don ?')) return;
  const donations = getDonations();
  const idx = donations.findIndex(d=>d.id===id);
  if(idx<0) return;
  donations[idx].status = 'rejete';
  setDonations(donations);

function exportDonationReceiptPDF(id){
  const d = getDonations().find(x=>x.id===id);
  if(!d) return;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:'pt', format:'a4'});
  let {y, margin, pageWidth} = pdfDrawHeader(doc, 'Reçu de don');

  doc.setFont('helvetica','bold'); doc.setFontSize(13); doc.setTextColor(21,51,39);
  doc.text('Reçu officiel de don', margin, y); y += 30;

  pdfRow(doc, margin, y, 'Donateur', d.donorName); y += 18;
  pdfRow(doc, margin, y, 'Date du don', fmtDate(d.date)); y += 18;
  pdfRow(doc, margin, y, 'Montant', fmtFCFA(d.amount)); y += 18;
  pdfRow(doc, margin, y, 'Moyen de paiement', d.method); y += 18;
  if(d.reference){ pdfRow(doc, margin, y, 'Référence', d.reference); y += 18; }
  pdfRow(doc, margin, y, 'Affectation', d.campaignTitle || 'Don libre'); y += 18;
  pdfRow(doc, margin, y, 'Confirmé par', d.confirmedBy || '—'); y += 34;

  doc.setFont('helvetica','italic'); doc.setFontSize(9); doc.setTextColor(140,140,140);
  doc.text("Ce reçu atteste qu'un don a été reçu par l'association à la date indiquée.", margin, y);

  doc.save(`recu_don_${(d.donorName||'donateur').replace(/\s+/g,'_')}.pdf`);
}

function exportDonationsHistoryPDF(){
  const confirmed = getDonations().filter(d=>d.status==='confirme').slice().reverse();
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:'pt', format:'a4'});
  let {y, margin, pageWidth} = pdfDrawHeader(doc, 'Historique des dons confirmés');

  const colDate = margin, colDonor = margin+70, colCamp = margin+220, colAmount = pageWidth-margin;

  doc.setFont('helvetica','bold'); doc.setFontSize(9.5); doc.setTextColor(90,100,95);
  doc.text('Date', colDate, y);
  doc.text('Donateur', colDonor, y);
  doc.text('Campagne', colCamp, y);
  doc.text('Montant', colAmount, y, {align:'right'});
  y += 8;
  doc.setDrawColor(226,223,209); doc.line(margin, y, pageWidth-margin, y);
  y += 16;

  let total = 0;
  doc.setFont('helvetica','normal'); doc.setFontSize(9.5); doc.setTextColor(27,43,34);
  if(!confirmed.length){
    doc.setTextColor(140,140,140);
    doc.text('Aucun don confirmé pour le moment.', margin, y);
    y += 18;
  }
  confirmed.forEach(d=>{
    total += Number(d.amount||0);
    doc.setTextColor(27,43,34);
    doc.text(fmtDate(d.date), colDate, y);
    doc.text(doc.splitTextToSize(d.donorName||'', 140), colDonor, y);
    doc.text(doc.splitTextToSize(d.campaignTitle||'Don libre', 110), colCamp, y);
    doc.text(fmtFCFA(d.amount), colAmount, y, {align:'right'});
    y += 16;
    if(y > 770){ doc.addPage(); y = 60; }
  });

  y += 10;
  doc.setDrawColor(226,223,209); doc.line(margin, y, pageWidth-margin, y);
  y += 18;
  doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(21,51,39);
  doc.text('Total des dons confirmés', colDonor, y);
  doc.text(fmtFCFA(total), colAmount, y, {align:'right'});

  doc.save('historique_dons.pdf');
}

function orderStatusBadge(status){
  if(status==='confirme') return `<span class="badge badge-ok">Confirmée</span>`;
  if(status==='annule') return `<span class="badge badge-warn" style="background:#F7DADA;color:var(--danger);">Annulée</span>`;
  return `<span class="badge badge-warn">En attente</span>`;
}
function productCardHtml(p, session){
  return `
  <div class="card" style="padding:12px;">
    ${p.image ? `<img src="${p.image}" style="width:100%;height:140px;object-fit:cover;border-radius:10px;margin-bottom:8px;">` : ''}
    <div style="font-weight:700;font-size:15px;">${escapeHtml(p.name)}</div>
    ${p.description ? `<div style="font-size:12.5px;color:var(--ink-soft);margin:4px 0;">${escapeHtml(p.description)}</div>` : ''}
    <div style="font-weight:700;color:var(--primary);font-size:16px;margin:6px 0;">${fmtFCFA(p.price)}</div>
    <div style="display:flex;gap:8px;align-items:center;">
      <input type="number" id="qty_${p.id}" value="1" min="1" style="width:60px;padding:8px;border-radius:8px;border:1.5px solid var(--border);">
      <button class="btn btn-primary btn-sm" onclick="orderProduct('${p.id}')">Commander</button>
    </div>
    ${isStaff(session) ? `<button class="btn btn-danger btn-sm" style="margin-top:8px;" onclick="deleteProduct('${p.id}')">${ICONS.trash} Supprimer</button>` : ''}
  </div>`;
}
function orderProduct(productId){
  const product = getProducts().find(p=>p.id===productId);
  if(!product) return;
  const qtyInput = document.getElementById('qty_'+productId);
  const quantity = Math.max(1, Number(qtyInput.value)||1);
  const session = getSession();
  const orders = getOrders();
  orders.push({
    id: uid(), productId, productName: product.name, quantity,
    totalAmount: product.price*quantity, buyerName: session.fullName,
    date: new Date().toISOString().slice(0,10), status:'en_attente', createdAt: new Date().toISOString()
  });
  setOrders(orders);
  toast('Commande enregistrée. Le trésorier vous contactera pour le paiement.');
  render();
}
function confirmOrder(id){
  const orders = getOrders();
  const idx = orders.findIndex(o=>o.id===id);
  if(idx<0) return;
  const o = orders[idx];
  const session = getSession();
  o.status = 'confirme';
  setOrders(orders);
  const entries = getAccounting();
  entries.push({
    id: uid(), type:'recette', amount: o.totalAmount, source: 'boutique',
    description: `Vente boutique — ${o.productName} x${o.quantity} (${o.buyerName})`,
    date: o.date, recordedBy: session.fullName, recordedAt: new Date().toISOString()
  });
  setAccounting(entries);
  toast('Commande confirmée et enregistrée en comptabilité.');
  render();
}
function cancelOrder(id){
  if(!confirm('Annuler cette commande ?')) return;
  const orders = getOrders();
  const idx = orders.findIndex(o=>o.id===id);
  if(idx<0) return;
  orders[idx].status = 'annule';
  setOrders(orders);
  toast('Commande annulée.');
  render();
}
function deleteProduct(id){
  if(!confirm('Supprimer ce produit ?')) return;
  setProducts(getProducts().filter(p=>p.id!==id));
  toast('Produit supprimé.');
  render();
}

async function saveProfile(session){
  const users = getUsers();
  const idx = users.findIndex(u=>u.username===session.username);
  if(idx<0) return;
  const newName = document.getElementById('profilName').value.trim() || session.fullName;
  users[idx].fullName = newName;
  users[idx].phone = document.getElementById('profilPhone').value.trim();
  users[idx].email = document.getElementById('profilEmail').value.trim();

  const photoInput = document.getElementById('profilePhotoInput');
  if(photoInput.files[0]){
    try{
      users[idx].profilePhoto = await compressImageFile(photoInput.files[0], 500, 0.85);
    }catch(e){ /* on garde l'ancienne photo si la compression échoue */ }
  }
  setUsers(users);

  // Mettre à jour la session en cours pour refléter immédiatement le nouveau nom
  const s = getSession();
  s.fullName = newName;
  setSession(s);

  toast('Profil enregistré.');
  render();
}
function removeProfilePhoto(){
  const session = getSession();
  const users = getUsers();
  const idx = users.findIndex(u=>u.username===session.username);
  if(idx<0) return;
  delete users[idx].profilePhoto;
  setUsers(users);
  toast('Photo de profil supprimée.');
  render();
}
function resetProfileInfo(){
  if(!confirm('Supprimer votre téléphone, e-mail et nom personnalisé ? Votre photo ne sera pas affectée.')) return;
  const session = getSession();
  const users = getUsers();
  const idx = users.findIndex(u=>u.username===session.username);
  if(idx<0) return;
  users[idx].fullName = users[idx].username;
  users[idx].phone = '';
  users[idx].email = '';
  setUsers(users);
  const s = getSession();
  s.fullName = users[idx].username;
  setSession(s);
  toast('Informations réinitialisées.');
  render();
}
